version: "3.9"

services:
  api:
    build: ./backend
    container_name: node_server
    expose:
      - "3000"
    networks:
      - app-network

  nginx:
    image: nginx:v1
    build: ./frontend
    container_name: nginx_server
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
    networks:
      - app-network

networks:
  app-network:
    driver: bridge